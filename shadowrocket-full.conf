[General]
bypass-system = true
skip-proxy = 127.0.0.1, localhost, *.local
dns-server = system
ipv6 = false

[Rule]
# Replace HK, US, and FAST with the policy names from your subscription.
# HK = Hong Kong node / policy group
# US = United States node / policy group
# FAST = Auto / url-test / fastest policy group

