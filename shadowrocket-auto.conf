[General]
bypass-system = true
skip-proxy = 127.0.0.1, localhost, *.local
dns-server = system
ipv6 = false

[Proxy Group]
HK_AUTO = url-test, Xray VMess：IEPL-香港01 - 解锁流媒体, Xray VMess：CU | 香港05 - 解锁流媒体, Xray VMess：CT | 香港06 - 解锁流媒体, SS-Rust：CM | 香港07 - 解锁流媒体, Xray VMess：海外直连 | 香港, url=http://www.gstatic.com/generate_204, interval=600, tolerance=50
US_AUTO = url-test, SS-Rust：IEPL | 美国01-解锁流媒体, SS-Rust：CU | 美国02, SS-Rust：CT | 美国03 - 解锁流媒体, Xray VMess：CU | 美国04 - 解锁流媒体, url=http://www.gstatic.com/generate_204, interval=600, tolerance=50
FAST_AUTO = url-test, SS-Rust：IEPL | 美国01-解锁流媒体, SS-Rust：CU | 新加坡02 | 解锁流媒体, Xray VMess：CU | 香港05 - 解锁流媒体, SS-Rust：IEPL | 新加坡 | 解锁流媒体, SS-Rust：IEPL-马来西亚, Xray VMess：IEPL-香港01 - 解锁流媒体, SS-Rust：CT | 美国03 - 解锁流媒体, Xray VMess：CU | 美国04 - 解锁流媒体, Xray VMess：CU | 日本01, SS-Rust：CM | 日本02, Xray VMess：CU | 荷兰 - 解锁流媒体, SS-Rust：CM | 印尼丨解锁流媒体, url=http://www.gstatic.com/generate_204, interval=600, tolerance=50

